<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>WicketGram - Choose Version</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a472a 0%, #0d1117 100%);
            color: #e6edf3;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #f0b429;
        }
        p {
            font-size: 1.1em;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        .versions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .version-card {
            padding: 30px;
            border-radius: 12px;
            background: rgba(22,27,34,0.8);
            border: 1px solid rgba(240,180,41,0.2);
            text-decoration: none;
            color: #e6edf3;
            transition: all 0.3s;
            min-width: 200px;
        }
        .version-card:hover {
            border-color: #f0b429;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(240,180,41,0.15);
        }
        .version-card h2 {
            color: #f0b429;
            margin-top: 0;
        }
        .version-card p {
            margin: 10px 0 0 0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏏 WicketGram</h1>
        <p>Cricket Club Instagram Auto-Poster</p>

        <div class="versions">
            <a href="./main/" class="version-card">
                <h2>📱 Main Version</h2>
                <p>Current stable release</p>
            </a>
            <a href="./v2/" class="version-card">
                <h2>⚡ V2 Version</h2>
                <p>Latest with AI features</p>
            </a>
        </div>
    </div>
</body>
</html>
