<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    input { padding: 10px; width: 100%; margin: 10px 0; background: #333; color: #fff; border: 1px solid #666; }
    button { padding: 10px 20px; background: #0066cc; color: #fff; border: none; cursor: pointer; }
    #output { border: 1px solid #666; padding: 15px; margin: 20px 0; background: #0a0a0a; min-height: 100px; }
  </style>
</head>
<body>
  <h2>OpenAI API Test</h2>

  <label>Paste your OpenAI API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-proj-...">

  <button onclick="testAPI()">Test Image Generation (1792x1024)</button>

  <div id="output">Results will appear here...</div>

  <script>
    async function testAPI() {
      const apiKey = document.getElementById('apiKey').value;
      const output = document.getElementById('output');

      if(!apiKey) {
        output.innerHTML = '❌ Enter API key first';
        return;
      }

      output.innerHTML = '🔄 Testing API...';

      try {
        const response = await fetch('https://api.openai.com/v1/images/generations', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'gpt-image-1.5',
            prompt: 'A cricket player batting in a stadium',
            n: 1,
            size: '1792x1024'
          })
        });

        const data = await response.json();

        if(!response.ok) {
          output.innerHTML = `❌ API Error (${response.status}):<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
          return;
        }

        if(data.data && data.data[0]) {
          output.innerHTML = `✅ SUCCESS!<br><br>Image URL: ${data.data[0].url}<br><br><img src="${data.data[0].url}" style="max-width: 100%; margin-top: 20px;">`;
        } else {
          output.innerHTML = `❌ Unexpected response:<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch(e) {
        output.innerHTML = `❌ Error: ${e.message}`;
      }
    }
  </script>
</body>
</html>
